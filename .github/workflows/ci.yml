name: ci

on:
  push:
    branches: [main]
  pull_request:

permissions: {}

jobs:
  html:
    name: html5 validate
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5
        with:
          python-version: '3.12'
      - run: pip install html5validator
      - run: |
          html5validator \
            --root . \
            --match "*.html" \
            --ignore "index.html.pre-strip-backup" \
            --ignore "_tour.html" \
            --ignore-re "seed/" \
            --ignore-re "dispatches/" \
            --ignore-re "partials/" \
            --ignore-re "ARIA attribute .aria-pressed. is not allowed" \
            --ignore-re "Property .inset. doesn" \
            --ignore-re "Property .backdrop-filter. doesn" \
            --ignore-re "Property .print-color-adjust. doesn" \
            --ignore-re "Property .text-underline-offset. doesn" \
            --ignore-re "Attribute .media. not allowed on element .meta." \
            --ignore-re "Element .style. not allowed as child of element .div." \
            --ignore-re "linear-gradient" \
            --log INFO

  links:
    name: link check
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
      - uses: lycheeverse/lychee-action@8646ba30535128ac92d33dfc9133794bfdd9b411  # v2
        with:
          args: >-
            --no-progress
            --base https://loci.garden
            --exclude "^#"
            --exclude "localhost"
            --exclude "127\.0\.0\.1"
            --accept 200,429
            './*.html'
            './releases/index.html'
            './zoku/index.html'
          fail: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  deploy:
    name: deploy
    needs: [html, links]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Deploy and verify
        uses: appleboy/ssh-action@0ff4204d59e8e51228ff73bce53f80d53301dee2  # v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            cd ${{ vars.VPS_DEPLOY_PATH }}
            git fetch origin
            git reset --hard origin/main
            curl -sf https://loci.garden || exit 1
