name: validate

# HTML validity + link integrity checks for loci.garden static site.
# Runs on every PR and push to main.

on:
  push:
    branches: [main]
  pull_request:

jobs:
  html:
    name: html5 validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - run: pip install html5validator

      # Exclude backup and tour files that are not served as production pages.
      - name: Validate HTML
        run: |
          html5validator \
            --root . \
            --match "*.html" \
            --ignore "index.html.pre-strip-backup" \
            --ignore "_tour.html" \
            --ignore-re "ARIA attribute .aria-pressed. is not allowed" \
            --log INFO

  links:
    name: link check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check links
        uses: lycheeverse/lychee-action@v2
        with:
          # Check all HTML files. Skip mailto links, anchors-only refs,
          # and localhost. Tolerate rate-limit 429s as non-fatal.
          args: >-
            --no-progress
            --exclude-mail
            --exclude "^#"
            --exclude "localhost"
            --exclude "127\.0\.0\.1"
            --accept 429
            './**/*.html'
          fail: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
