name: deploy

# Auto-deploys loci.garden to the VPS after every merge to main.
# Also available as a manual trigger (workflow_dispatch) for out-of-band deploys.
#
# Required GitHub Secrets (Settings → Secrets → Actions):
#   VPS_HOST         — IP or hostname of the 1984 Hosting VPS
#   VPS_USER         — SSH user (e.g. deploy or root)
#   VPS_SSH_KEY      — private SSH key (PEM, no passphrase)
#   VPS_DEPLOY_PATH  — absolute path to the repo checkout on the VPS
#                      (e.g. /var/www/loci.garden)

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    name: deploy to VPS
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            cd ${{ secrets.VPS_DEPLOY_PATH }}
            git fetch origin
            git reset --hard origin/main
